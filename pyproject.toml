[project]
name = "doc-intelligence"
version = "1.0.0"
description = "A fast, local file indexing and duplicate detection tool built with Python and DuckDB"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = [
    "duckdb>=0.10.0",
    "xxhash>=3.4.0",
    "typer>=0.9.0",
    "rich>=13.0.0",
    "pyyaml>=6.0",
    "tqdm>=4.66.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[project.scripts]
doc-intelligence = "scripts.cli:main"
doc-scan = "scripts.scan:main"
doc-search = "scripts.search:main"
doc-duplicates = "scripts.find_duplicates:main"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["src*", "scripts*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
